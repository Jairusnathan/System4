# ──────────────────────────────────────────────────────────────
# FE Pipeline Caller (unified)
# Copy this file into the target repo at:
#   .github/workflows/master-pipeline-fe.yml
#
# Works for both single-system and multi-system FE repositories.
# The pipeline_mode input controls which SYSTEMS_JSON variable
# is read (auto = picks multi if available, else single).
#
# Required repo secret:
# - GH_PR_TOKEN (used for auto-promotion PRs and Vercel deploy PR comments)
# ──────────────────────────────────────────────────────────────
name: "Master Pipeline — FE"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      pipeline_mode:
        description: "Pipeline mode (auto|single|multi)"
        type: choice
        options: [auto, single, multi]
        default: auto
      enable_playwright:
        description: "Run Playwright E2E checks"
        type: boolean
        default: true
      playwright_browsers:
        description: "Playwright browser list (JSON array or CSV)"
        type: string
        default: '["chromium"]'
      e2e_base_url:
        description: "Optional base URL for Playwright E2E"
        type: string
        default: ""
      playwright_run_only_on_branch:
        description: "Branch allowed for Playwright execution (* to always run when pipeline includes it)"
        type: string
        default: "*"
      enable_grafana_k6:
        description: "Run Grafana k6 cloud checks"
        type: boolean
        default: true
      k6_script_path:
        description: "Path to k6 script or performance tests directory"
        type: string
        default: "tests/performance"
      k6_base_url:
        description: "Optional base URL for k6"
        type: string
        default: ""
      k6_run_only_on_branch:
        description: "Branch allowed for k6 execution (* to always run when pipeline includes it)"
        type: string
        default: "*"
      run_deploy:
        description: "Run deploy jobs"
        type: boolean
        default: true
      run_promotion:
        description: "Run PR promotion jobs"
        type: boolean
        default: true
      dry_run:
        description: "Preview-only mode (skip deploy/tag push, print PR body)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write
  security-events: write

jobs:
  call-orchestrator:
    # Track latest central workflow updates
    uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-fe.yml@main
    with:
      pipeline_mode: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pipeline_mode || 'auto' }}
      enable_playwright: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_playwright || 'true') || true }}
      playwright_browsers: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.playwright_browsers || '["chromium"]' }}
      e2e_base_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.e2e_base_url || '' }}
      playwright_run_only_on_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.playwright_run_only_on_branch || '*' }}
      enable_grafana_k6: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_grafana_k6 || 'true') || true }}
      k6_script_path: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_script_path || 'tests/performance' }}
      k6_base_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_base_url || '' }}
      k6_run_only_on_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_run_only_on_branch || '*' }}
      run_deploy: ${{ fromJSON(github.event_name == 'push' && 'true' || github.event_name == 'workflow_dispatch' && (github.event.inputs.run_deploy || 'true') || 'false') }}
      run_promotion: ${{ fromJSON(github.event_name == 'push' && 'true' || github.event_name == 'workflow_dispatch' && (github.event.inputs.run_promotion || 'true') || 'false') }}
      dry_run: ${{ fromJSON(github.event_name == 'pull_request' && 'true' || github.event_name == 'workflow_dispatch' && (github.event.inputs.dry_run || 'false') || 'false') }}
    secrets: inherit

  sonarcloud-nexoos-coverage:
    name: "SonarCloud - nexOOS Coverage"
    needs: call-orchestrator
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: nexOOS/package-lock.json

      - name: Generate nexOOS LCOV coverage
        run: |
          set -euo pipefail
          npm --prefix nexOOS ci --ignore-scripts
          npm --prefix nexOOS run test -- --runInBand tests/unit

      - name: Verify nexOOS LCOV report
        run: |
          set -euo pipefail
          test -s nexOOS/coverage/lcov.info

      - name: Run SonarCloud Scan with nexOOS Coverage
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
